<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>KnitDay</title>
    <base href="/KnitDay/" />
    <script>
        (function () {
            var redirect = sessionStorage.redirect;
            delete sessionStorage.redirect;
            if (redirect && redirect !== location.href) {
                history.replaceState(null, null, redirect);
            }
        })();
    </script>

    <!-- iOS Safari 폴리필: Map.prototype.getOrInsertComputed (PDF.js 5.7+ 요구) -->
    <script>
        if (typeof Map !== 'undefined' && !Map.prototype.getOrInsertComputed) {
            Map.prototype.getOrInsertComputed = function(key, fn) {
                if (!this.has(key)) {
                    this.set(key, fn(key));
                }
                return this.get(key);
            };
        }
    </script>

    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" href="icons/Knit.svg" type="image/svg+xml" />

    <!-- SVG 아이콘 preload — Knit.svg 최우선 (로딩 화면용) -->
    <link rel="preload" href="icons/Knit.svg"        as="image" type="image/svg+xml" />
    <link rel="preload" href="icons/Home.svg"       as="image" type="image/svg+xml" />
    <link rel="preload" href="icons/Calendar.svg"   as="image" type="image/svg+xml" />
    <link rel="preload" href="icons/octopus.svg"    as="image" type="image/svg+xml" />
    <link rel="preload" href="icons/Done.svg"       as="image" type="image/svg+xml" />
    <link rel="preload" href="icons/Wish.svg"       as="image" type="image/svg+xml" />
    <link rel="preload" href="icons/Yarn_ball.svg"  as="image" type="image/svg+xml" />
    <link rel="preload" href="icons/Swatch.svg"     as="image" type="image/svg+xml" />
    <link rel="preload" href="icons/Tool.svg"       as="image" type="image/svg+xml" />
    <link rel="preload" href="icons/Chart.svg"      as="image" type="image/svg+xml" />
    <link rel="preload" href="icons/Setting.svg"    as="image" type="image/svg+xml" />
    <link rel="preload" href="icons/Dark.svg"       as="image" type="image/svg+xml" />
    <link rel="preload" href="icons/Light.svg"      as="image" type="image/svg+xml" />
    <link rel="preload" href="icons/Time.svg"       as="image" type="image/svg+xml" />

    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="white" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-title" content="KnitDay" />
</head>
<body>
    <!-- 회전 안내 오버레이 -->
    <div id="rotate-overlay" style="
        display:none;
        position:fixed; inset:0; z-index:99999;
        background:#fff;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        font-family:'Noto Sans KR',sans-serif;
        color:#111111;
        gap:20px;
        text-align:center;
        padding:32px;
    ">
        <img src="icons/Knit.svg" style="width:72px;height:72px;opacity:0.7;" />
        <div id="rotate-message" style="font-size:1.1rem;font-weight:600;line-height:1.6;"></div>
    </div>

    <style>
        /* 모바일(max-width:1023px): 가로 방향이면 오버레이 표시 */
        @media (max-width: 1023px) and (orientation: landscape) {
            #rotate-overlay { display: flex !important; }
        }
        /* 태블릿(min-width:1024px): 세로 방향이면 오버레이 표시 */
        @media (min-width: 1024px) and (orientation: portrait) {
            #rotate-overlay { display: flex !important; }
        }
    </style>

    <script>
        (function () {
            var msg = document.getElementById('rotate-message');
            function updateMessage() {
                // 기기의 긴 쪽 길이로 태블릿 여부 판단
                var longerSide = Math.max(window.screen.width, window.screen.height);
                var isTablet = longerSide >= 1024;
                if (isTablet) {
                    msg.textContent = '가로 모드로 회전해주세요 🔄';
                } else {
                    msg.textContent = '세로 모드로 회전해주세요 🔄';
                }
            }
            updateMessage();
            window.addEventListener('resize', updateMessage);
            window.addEventListener('orientationchange', updateMessage);
        })();
    </script>

    <div id="app">
        <div id="loading-screen" style="display:flex; flex-direction:column; align-items:center; justify-content:center;
                    height:100vh; font-family:'Noto Sans KR',sans-serif; color:#111111;">
            <div style="margin-bottom:16px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 24 24"
                     fill="none" stroke="#888888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M7 7L18 18"/>
                    <path d="M17 7L6 18"/>
                    <circle cx="6" cy="19" r="1"/>
                    <circle cx="18" cy="19" r="1"/>
                    <path d="M6.3 6.3L7 7"/>
                    <path d="M17.7 6.3L17 7"/>
                </svg>
            </div>
            <div style="font-size:1.1rem;">잠시만요, 첫 코를 잡고 있어요...</div>
            <div id="loading-error" style="display:none;margin-top:16px;padding:12px 16px;background:#fff0f0;
                 border-radius:8px;font-size:0.8rem;color:#c00;max-width:80vw;word-break:break-all;text-align:center;"></div>
        </div>
    </div>

    <script>
        window.onerror = function(msg, src, line, col, err) {
            var el = document.getElementById('loading-error');
            if (el) { el.style.display = 'block'; el.textContent = '오류: ' + msg + (src ? ' (' + src.split('/').pop() + ':' + line + ')' : ''); }
        };
        window.addEventListener('unhandledrejection', function(e) {
            var el = document.getElementById('loading-error');
            if (el) { el.style.display = 'block'; el.textContent = '오류: ' + (e.reason?.message || e.reason || '알 수 없는 오류'); }
        });
    </script>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="js/patternViewer.js"></script>
    <script src="js/app.js"></script>
    
    <script type="module" src="js/firebase.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js');</script>
</body>
</html>
