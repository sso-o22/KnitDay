name: Deploy KnitDay to GitHub Pages

on:
  push:
    branches: [ master ]

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Inject Firebase API Key
        run: |
          sed -i "s|%%FIREBASE_API_KEY%%|${{ secrets.FIREBASE_API_KEY }}|g" \
            BlazorApp1/wwwroot/js/firebase.js

      - name: Publish
        run: dotnet publish BlazorApp1/BlazorApp1.csproj -c Release -o publish

      - name: Find service worker files
        run: find publish -name "service-worker*" 2>/dev/null || echo "nothing found"

      - name: Use published service worker
        run: |
          cp publish/wwwroot/service-worker.published.js \
             publish/wwwroot/service-worker.js

      - name: Add .nojekyll
        run: touch publish/wwwroot/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish/wwwroot